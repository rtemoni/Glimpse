name: Checks

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  swift:
    name: Swift build and test
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Validate release manifest
        run: |
          python3 -m json.tool updates/latest.json >/dev/null
          test "$(python3 -c 'import json; print(json.load(open("updates/latest.json"))["branch"])')" = "main"
