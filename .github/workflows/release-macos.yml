name: Release macOS DMG

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to package when running manually, for example 0.1.0"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-dmg:
    name: Build signed DMG
    runs-on: macos-latest

    env:
      APP_NAME: Glimpse
      PRODUCT_NAME: Glimpse
      BUNDLE_IDENTIFIER: ${{ vars.BUNDLE_IDENTIFIER || 'com.rtemoni.Glimpse' }}
      RELEASE_BRANCH: main
      SIGNING_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && -n "${{ github.event.inputs.version }}" ]]; then
            version="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="0.1.0"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Packaging version $version"

      - name: Import Developer ID certificate
        shell: bash
        env:
          DEVELOPER_ID_APPLICATION_P12_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          DEVELOPER_ID_APPLICATION_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "$DEVELOPER_ID_APPLICATION_P12_BASE64" ]]; then
            echo "No Developer ID certificate secret configured; local artifact will be ad-hoc signed."
            exit 0
          fi

          keychain_password="${KEYCHAIN_PASSWORD:-$(uuidgen)}"
          certificate_path="$RUNNER_TEMP/developer-id-application.p12"
          keychain_path="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$DEVELOPER_ID_APPLICATION_P12_BASE64" | base64 -D > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -P "$DEVELOPER_ID_APPLICATION_P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"

      - name: Run tests
        shell: bash
        run: swift test

      - name: Build app bundle
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
          RESET_SCREEN_CAPTURE_TCC: "0"
        run: scripts/build_app.sh

      - name: Smoke test packaged app
        run: scripts/smoke_test_app.sh ".build/distribution/Glimpse.app"

      - name: Create DMG
        id: dmg
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          notarize=0
          if [[ -n "$SIGNING_IDENTITY" && -n "$APPLE_ID" && -n "$APPLE_TEAM_ID" && -n "$APPLE_APP_SPECIFIC_PASSWORD" ]]; then
            notarize=1
          fi

          NOTARIZE="$notarize" scripts/create_dmg.sh ".build/distribution/Glimpse.app"
          dmg_path=".build/distribution/Glimpse-$VERSION.dmg"
          echo "dmg_path=$dmg_path" >> "$GITHUB_OUTPUT"

      - name: Verify DMG layout
        run: scripts/verify_dmg.sh "${{ steps.dmg.outputs.dmg_path }}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: Glimpse-${{ steps.version.outputs.version }}-dmg
          path: ${{ steps.dmg.outputs.dmg_path }}
          if-no-files-found: error

      - name: Upload DMG to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$GITHUB_REF_NAME"
          dmg_path="${{ steps.dmg.outputs.dmg_path }}"

          gh release view "$tag" >/dev/null 2>&1 \
            || gh release create "$tag" --title "$tag" --generate-notes
          gh release upload "$tag" "$dmg_path" --clobber

      - name: Publish update manifest
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ steps.version.outputs.version }}"
          tag="$GITHUB_REF_NAME"
          release_branch="$RELEASE_BRANCH"
          release_url="https://github.com/${GITHUB_REPOSITORY}/releases/tag/$tag"
          download_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/$tag/Glimpse-$version.dmg"

          git fetch origin "$release_branch"
          git switch "$release_branch"
          git pull --ff-only origin "$release_branch"

          mkdir -p updates
          cat > updates/latest.json <<JSON
          {
            "version": "$version",
            "build": "${{ github.run_number }}",
            "tag": "$tag",
            "releaseDate": "$(date -u +%F)",
            "minimumSystemVersion": "13.0",
            "downloadURL": "$download_url",
            "releaseNotesURL": "$release_url",
            "branch": "$release_branch"
          }
          JSON

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add updates/latest.json
          if git diff --cached --quiet; then
            echo "Update manifest is already current."
          else
            git commit -m "Update release manifest for $tag"
            git push origin "$release_branch"
          fi
